<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Aesthetic Website</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #c3cfe2, #f5f7fa);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .container {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 50px;
            max-width: 900px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            animation: fadeIn 1.2s ease;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.8rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.8;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.12);
        }

        .card h3 {
            margin-bottom: 12px;
            font-weight: 500;
        }

        .card p {
            font-size: 0.95rem;
            opacity: 0.8;
        }

        .button {
            display: inline-block;
            margin-top: 40px;
            padding: 14px 36px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 500;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .button:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 25px rgba(102, 126, 234, 0.4);
        }

        footer {
            text-align: center;
            margin-top: 40px;
            font-size: 0.85rem;
            opacity: 0.7;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Welcome ✨</h1>
            <p>A simple, aesthetic & beautiful website</p>
        </header>

        <section class="cards">
            <div class="card">
                <h3>🌿 Clean Design</h3>
                <p>Minimal, modern, and visually pleasing layout.</p>
            </div>

            <div class="card">
                <h3>⚡ Fast & Simple</h3>
                <p>Pure HTML & CSS — no heavy frameworks.</p>
            </div>

            <div class="card">
                <h3>🎨 Aesthetic</h3>
                <p>Soft colors, smooth animations, and elegance.</p>
            </div>
        </section>

        <div style="text-align: center;">
            <a href="#" class="button">Get Started</a>
        </div>

        <footer>
            © 2025 • Designed with ❤️
        </footer>
    </div>

</body>
</html>
